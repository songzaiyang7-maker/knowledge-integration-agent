心概念"}, {"id": "03__1fa938", "name": "心肌异长自身调节", "symbolSize": 32, "category": 1, "itemStyle": {"color": "#ff9f7f"}, "label": {"show": true, "fontSize": 11}, "value": 1, "_definition": "心肌收缩力随前负荷的变化而变化的现象。", "_chapter": "第四章  血液循环", "_page": 103, "_textbook": "03_生理学", "_category_type": "核心概念"}, {"id": "03__a1eccc", "name": "突触传递", "symbolSize": 32, "category": 1, "itemStyle": {"color": "#ff9f7f"}, "label": {"show": true, "fontSize": 11}, "value": 1, "_definition": "突触传递是指神经冲动通过突触结构传递到下一个神经元的过程，包括递质释放、扩散、突触后受体激活以及递质消除等环节。", "_chapter": "第十章  神经系统的功能", "_page": 312, "_textbook": "03_生理学", "_category_type": "生理过程"}, {"id": "03__48ea51", "name": "递质释放", "symbolSize": 32, "category": 1, "itemStyle": {"color": "#ff9f7f"}, "label": {"show": true, "fontSize": 11}, "value": 1, "_definition": "递质释放是指突触前神经元末梢释放神经递质到突触间隙的过程，其量主要决定于进入末梢的Ca2+量。", "_chapter": "第十章  神经系统的功能", "_page": 312, "_textbook": "03_生理学", "_category_type": "生理过程"}, {"id": "03__f0cc16", "name": "递质清除", "symbolSize": 32, "category": 1, "itemStyle": {"color": "#ff9f7f"}, "label": {"show": true, "fontSize": 11}, "value": 1, "_definition": "递质清除是指已释放的递质被突触前末梢重摄取或被酶解代谢的过程。", "_chapter": "第十章  神经系统的功能", "_page": 312, "_textbook": "03_生理学", "_category_type": "生理过程"}, {"id": "03__e161aa", "name": "突触后膜反应性", "symbolSize": 32, "category": 1, "itemStyle": {"color": "#ff9f7f"}, "label": {"show": true, "fontSize": 11}, "value": 1, "_definition": "突触后膜反应性是指突触后膜在递质释放量发生改变时，受体的密度及与递质结合的亲和力可发生改变，从而改变突触后膜的反应性。", "_chapter": "第十章  神经系统的功能", "_page": 312, "_textbook": "03_生理学", "_category_type": "生理过程"}, {"id": "03__d2fab8", "name": "兴奋性突触后电位（EPSP）", "symbolSize": 32, "category": 1, "itemStyle": {"color": "#ff9f7f"}, "label": {"show": true, "fontSize": 11}, "value": 1, "_definition": "兴奋性突触后电位是指突触传递在突触后膜引起的去极化突触后电位，根据电位时程的长短可分为快、慢兴奋性突触后电位。", "_chapter": "第十章  神经系统的功能", "_page": 312, "_textbook": "03_生理学", "_category_type": "生理过程"}, {"id": "03__71bc54", "name": "抑制性突触后电位（IPSP）", "symbolSize": 32, "category": 1, "itemStyle": {"col
